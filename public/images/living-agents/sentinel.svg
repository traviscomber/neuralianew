<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-sentinel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad-sentinel)"/>
  
  <!-- Grid background -->
  <g stroke="#00D9FF" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="0" x2="400" y2="0"/>
    <line x1="0" y1="30" x2="400" y2="30"/>
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="90" x2="400" y2="90"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="210" x2="400" y2="210"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="270" x2="400" y2="270"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
  </g>
  
  <!-- Observer pattern - eyes and analysis lines -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="150" r="60" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <circle cx="170" cy="140" r="8" fill="#00D9FF"/>
  <circle cx="230" cy="140" r="8" fill="#00D9FF"/>
  <line x1="100" y1="200" x2="300" y2="200" stroke="#0099CC" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="220" x2="280" y2="220" stroke="#0099CC" stroke-width="1" opacity="0.4"/>
  <line x1="140" y1="240" x2="260" y2="240" stroke="#0099CC" stroke-width="1" opacity="0.3"/>
  
  <!-- Corner accent -->
  <rect x="10" y="10" width="30" height="30" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.4"/>
  <rect x="360" y="260" width="30" height="30" fill="none" stroke="#0099CC" stroke-width="2" opacity="0.4"/>
</svg>
