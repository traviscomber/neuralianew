<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-historian" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad-historian)"/>
  
  <!-- Grid background -->
  <g stroke="#00D9FF" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="0" x2="400" y2="0"/>
    <line x1="0" y1="30" x2="400" y2="30"/>
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="90" x2="400" y2="90"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="210" x2="400" y2="210"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="270" x2="400" y2="270"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
  </g>
  
  <!-- Timeline pattern -->
  <line x1="200" y1="50" x2="200" y2="250" stroke="#00D9FF" stroke-width="2" opacity="0.6"/>
  <circle cx="200" cy="80" r="6" fill="#00D9FF"/>
  <rect x="180" y="85" width="40" height="20" fill="none" stroke="#00D9FF" stroke-width="1"/>
  <circle cx="200" cy="140" r="8" fill="#0099CC"/>
  <rect x="175" y="150" width="50" height="25" fill="none" stroke="#0099CC" stroke-width="1"/>
  <circle cx="200" cy="210" r="6" fill="#00D9FF"/>
  <rect x="180" y="215" width="40" height="20" fill="none" stroke="#00D9FF" stroke-width="1"/>
  <path d="M 150 120 L 250 120" stroke="#0099CC" stroke-width="1" opacity="0.4"/>
  <path d="M 140 170 L 260 170" stroke="#0099CC" stroke-width="1" opacity="0.4"/>
  
  <!-- Corner accent -->
  <rect x="10" y="10" width="30" height="30" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.4"/>
  <rect x="360" y="260" width="30" height="30" fill="none" stroke="#0099CC" stroke-width="2" opacity="0.4"/>
</svg>
